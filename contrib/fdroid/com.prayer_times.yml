AutoName: Prayer Times
Name: Prayer Times
Summary: Islamic prayer times, Qibla, and home screen widget
Description: |
  View daily prayer times with GPS or manual location, browse a full month,
  use a Qibla compass, get prayer notifications, and use a home screen
  widget (Android). Supports several calculation sources and locales
  (e.g. English, Swedish, Arabic with RTL).

  This F-Droid build uses the upstream **fdroid** product flavor: it does not
  include Google Play in-app billing or the in-app “support developer” purchase
  flow.

RepoType: git
Repo: https://github.com/Hassan-PS/PrayerApp

Builds:
  - versionName: 1.3.7
    versionCode: 11
    commit: v1.3.7
    subdir: android
    sudo:
      - apt-get update || apt-get update
      - apt-get install -y npm nodejs
    init:
      - cd ..
      - npm ci --no-audit
    ndk: 27.1.12297006
    gradle:
      - fdroid
    output: app/build/outputs/apk/fdroid/release/app-fdroid-release.apk

