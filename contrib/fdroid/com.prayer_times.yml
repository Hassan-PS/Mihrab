Name: Prayer Times
AutoName: Prayer Times
Description: |
  View daily prayer times with GPS or manual location, browse a full month,
  use a Qibla compass, get prayer notifications, and use a home screen
  widget (Android). Several calculation sources and locales (e.g. English,
  Swedish, Arabic with RTL).

  This build uses the upstream **fdroid** Gradle product flavor: no Google Play
  in-app billing and no in-app “support developer” purchase UI.

RepoType: git
Repo: https://github.com/Hassan-PS/PrayerApp

Builds:

  - versionName: 1.4.1
    versionCode: 15
    commit: v1.4.1
    subdir: android
    sudo:
      - sysctl fs.inotify.max_user_watches=524288 || true
      - apt-get update
      - apt-get install -y curl ca-certificates xz-utils
      - curl -Lo /tmp/jdk17.tar.gz 
        https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.18%2B8/OpenJDK17U-jdk_x64_linux_hotspot_17.0.18_8.tar.gz
      - echo "0c94cbb54325c40dcf026143eb621562017db5525727f2d9131a11250f72c450  /tmp/jdk17.tar.gz"
        | sha256sum -c -
      - tar xzf /tmp/jdk17.tar.gz -C /usr/local
      - ln -sfn /usr/local/jdk-17.0.18+8 /usr/local/jdk-17
      - rm -f /tmp/jdk17.tar.gz
      - curl -Lo node.tar.xz https://nodejs.org/dist/v20.19.0/node-v20.19.0-linux-x64.tar.xz
      - echo "b4e336584d62abefad31baecff7af167268be9bb7dd11f1297112e6eed3ca0d5 node.tar.xz"
        | sha256sum -c -
      - tar xJf node.tar.xz
      - cp -a node-v20.19.0-linux-x64/. /usr/local/
    init:
      - cd ..
      - npm ci --no-audit
    gradle:
      - fdroid
    output: app/build/outputs/apk/fdroid/release/*.apk
    prebuild:
      - printf '\norg.gradle.java.home=/usr/local/jdk-17\n' >> gradle.properties
      - sed -i 's/org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=1024m/'
        gradle.properties
      - printf '\norg.gradle.daemon.performance.disable-logging=true\n' >> gradle.properties
    scanignore:
      - android/build.gradle
      - node_modules
    ndk: 27.1.12297006

MaintainerNotes: |
  React Native 0.83: Node 20 from upstream tarball (checksum-verified). `npm ci`
  runs from repo root; Gradle runs in `android/` with product flavor `fdroid`
  (no Play Billing). RN `@react-native/gradle-plugin` uses `jvmToolchain(17)`;
  JDK 21 does not satisfy that request. Trixie has no OpenJDK 17 apt package, so
  install Eclipse Temurin 17.0.18+8 (checksum-verified) to `/usr/local/jdk-17` and
  set `org.gradle.java.home` in `prebuild`.
  `output` points at `app/build/.../fdroid/release/*.apk` (RN app module); the
  default Gradle discovery path does not include `app/`. `prebuild` adjusts JVM
  args / daemon logging for CI.
  Scanner: `scanignore` uses `node_modules` (RN layout
  changes make per-package paths brittle) plus `android/build.gradle` for the
  AsyncStorage `local_repo` maven entry. If policy tightens, consider `scandelete`
  per https://f-droid.org/2020/10/14/adding-react-native-app-to-f-droid.html
  Upstream: https://github.com/Hassan-PS/PrayerApp/tree/main/contrib/fdroid
  Listing text is also in upstream Fastlane: fastlane/metadata/android/en-US/
  Reproducible builds: not requested for this app yet (RN/Hermes); APK F-Droid-signed.
  Single universal fdroidRelease APK (no ABI splits in this recipe).
  Location: `patch-package` strips `play-services-location` from
  `@react-native-community/geolocation` and uses AOSP `LocationManager` only so
  the scanner does not flag proprietary `com.google.android.gms` classes.
  Signing: older builds use `fdroid-release-signing-ifelse.patch` after
  fdroidserver strips keys; **v1.4.1+** ships that if/else in
  `android/app/build.gradle` already, so the 1.4.1 recipe has no `patch:`.

ArchivePolicy: 6
AutoUpdateMode: Version
