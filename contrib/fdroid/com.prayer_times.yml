Name: Prayer Times
AutoName: Prayer Times
Description: |
  View daily prayer times with GPS or manual location, browse a full month,
  use a Qibla compass, get prayer notifications, and use a home screen
  widget (Android). Several calculation sources and locales (e.g. English,
  Swedish, Arabic with RTL).

  This build uses the upstream **fdroid** Gradle product flavor: no Google Play
  in-app billing and no in-app “support developer” purchase UI.

RepoType: git
Repo: https://github.com/Hassan-PS/PrayerApp

Builds:
  - versionName: 1.3.7
    versionCode: 11
    commit: v1.3.7
    subdir: android
    sudo:
      - sysctl fs.inotify.max_user_watches=524288 || true
      - apt-get update
      - apt-get install -y curl ca-certificates xz-utils
      - curl -Lo node.tar.xz https://nodejs.org/dist/v20.19.0/node-v20.19.0-linux-x64.tar.xz
      - echo "b4e336584d62abefad31baecff7af167268be9bb7dd11f1297112e6eed3ca0d5 node.tar.xz"
        | sha256sum -c -
      - tar xJf node.tar.xz
      - cp -a node-v20.19.0-linux-x64/. /usr/local/
    init:
      - cd ..
      - npm ci --no-audit
    gradle:
      - fdroid
    output: app/build/outputs/apk/fdroid/release/app-fdroid-release.apk
    scanignore:
      - android/build.gradle
      - node_modules/jsc-android
      - node_modules/react-native/ReactAndroid
      - node_modules/react-native/sdks
      - node_modules/react-native/android
      - node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - node_modules/@react-native-community/geolocation/android/build.gradle
      - node_modules/react-native-gesture-handler/android/build.gradle
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
      - node_modules/react-native-sensors/android/build.gradle
      - node_modules/react-native-svg/android/build.gradle
      - node_modules/@notifee/react-native/android/build.gradle
      - node_modules/react-native-iap/android/build.gradle
    ndk: 27.1.12297006

MaintainerNotes: |
  React Native 0.83: Node 20 from upstream tarball (checksum-verified). `npm ci`
  runs from repo root; Gradle runs in `android/` with product flavor `fdroid`
  (no Play Billing). `scanignore` whitelists common `node_modules/*/android`
  local Maven / Gradle paths; extend if `fdroid build` fails the scanner.
  If policy requires removing prebuilts from `node_modules`, add `scandelete`
  and follow https://f-droid.org/2020/10/14/adding-react-native-app-to-f-droid.html
  Upstream: https://github.com/Hassan-PS/PrayerApp/tree/main/contrib/fdroid
  Listing text is also in upstream Fastlane: fastlane/metadata/android/en-US/
  Reproducible builds: not requested for this app yet (RN/Hermes); APK F-Droid-signed.
  Single universal fdroidRelease APK (no ABI splits in this recipe).

ArchivePolicy: 6
