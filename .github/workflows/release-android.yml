# Attach only F-Droid APK to the GitHub Release for the pushed tag.
name: Release Android artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure signing keystore for release updates
        run: |
          test -n "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" || { echo "Missing secret: ANDROID_UPLOAD_KEYSTORE_BASE64"; exit 1; }
          test -n "${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}" || { echo "Missing secret: ANDROID_UPLOAD_STORE_PASSWORD"; exit 1; }
          test -n "${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}" || { echo "Missing secret: ANDROID_UPLOAD_KEY_ALIAS"; exit 1; }
          test -n "${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}" || { echo "Missing secret: ANDROID_UPLOAD_KEY_PASSWORD"; exit 1; }
          echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          cat > android/keystore.properties <<'EOF'
          storePassword=${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      - name: Build F-Droid release APK
        working-directory: android
        run: ./gradlew assembleFdroidRelease --no-daemon
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8'

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/fdroid/release/app-fdroid-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
