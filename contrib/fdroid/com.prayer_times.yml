Builds:
  - versionName: 2.0.15
    versionCode: 138
    commit: v2.0.15
    subdir: android
    sudo:
      - apt-get update
      - apt-get install -y npm curl ca-certificates
      - curl -Lo /tmp/jdk17.tar.gz 
        https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.19%2B10/OpenJDK17U-jdk_x64_linux_hotspot_17.0.19_10.tar.gz
      - sha256sum /tmp/jdk17.tar.gz | grep -qF d8afc263758141a66e0e3aafc321e783f7016696f4eaea067d340a269037d331
      - tar -xzf /tmp/jdk17.tar.gz -C /usr/local
      - ln -snf /usr/local/jdk-17.0.19+10 /usr/local/jdk-17
    gradle:
      - fdroid
    output: app/build/outputs/apk/fdroid/release/*.apk
    prebuild:
      - printf '\norg.gradle.java.home=/usr/local/jdk-17\n' >> gradle.properties
      - echo 'reactNativeArchitectures=arm64-v8a,armeabi-v7a' >> gradle.properties
      - echo 'org.gradle.daemon=false' >> gradle.properties
      - cd ..
      - npm ci --no-audit --build-from-source
    scanignore:
      - node_modules
    ndk: 27.1.12297006

MaintainerNotes: |
  React Native 0.83: Node 20 from upstream tarball (checksum-verified). `npm ci`
  runs from repo root; Gradle runs in `android/` with product flavor `fdroid`
  (no Play Billing). RN `@react-native/gradle-plugin` uses `jvmToolchain(17)`;
  JDK 21 does not satisfy that request. Trixie has no OpenJDK 17 apt package, so
  install Eclipse Temurin 17.0.18+8 (checksum-verified) to `/usr/local/jdk-17` and
  set `org.gradle.java.home` in `prebuild`.
  `output` points at `app/build/.../fdroid/release/*.apk` (RN app module); the
  default Gradle discovery path does not include `app/`. `prebuild` sets
  `reactNativeArchitectures=arm64-v8a,armeabi-v7a` to halve NDK C++ codegen
  compile time (x86/x86_64 omitted; real devices only need the ARM ABIs) and
  `org.gradle.daemon=false` to free JVM heap for the parallel C++ compiler
  processes (prevents OOM on CI runners).
  Scanner: `scanignore` uses `node_modules` (RN layout
  changes make per-package paths brittle) plus `android/build.gradle` for the
  AsyncStorage `local_repo` maven entry. If policy tightens, consider `scandelete`
  per https://f-droid.org/2020/10/14/adding-react-native-app-to-f-droid.html
  Upstream: https://github.com/Hassan-PS/Mihrab/tree/main/contrib/fdroid
  Listing text is also in upstream Fastlane: fastlane/metadata/android/en-US/
  Reproducible builds: not requested for this app yet (RN/Hermes); APK F-Droid-signed.
  Single universal fdroidRelease APK (no ABI splits in this recipe).
  Location: `patch-package` strips `play-services-location` from
  `@react-native-community/geolocation` and uses AOSP `LocationManager` only so
  the scanner does not flag proprietary `com.google.android.gms` classes.
  Signing: older builds use `fdroid-release-signing-ifelse.patch` after
  fdroidserver strips keys; **v1.4.1+** ships that if/else in
  `android/app/build.gradle` already, so the 1.4.1 recipe has no `patch:`.

