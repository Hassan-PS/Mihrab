MaintainerNotes: |
  React Native 0.83 app. `npm ci` runs from the repo root; Gradle runs in
  `android/` with the `fdroid` product flavor (no Play Billing / no Google Play
  Services). The build uses the build server's default JDK (RN's
  `@react-native/gradle-plugin` requests `jvmToolchain(17)`; the `find … sed`
  line strips that request so the running JDK is used regardless of its version).

  Build configuration lives in the repo, not the recipe: `gradle.properties`
  carries the RN/Kotlin build-compat flags, and `app/build.gradle` turns R8 and
  release lint off for the `fdroid` flavor only (they OOM the CI runner when run
  in parallel) while keeping them on for the upstream Play release. The few
  remaining prebuild lines are the only settings that genuinely cannot live in
  the repo without breaking the upstream Play build or the CI budget:
  - `reactNativeArchitectures=arm64-v8a` — the repo default is all four ABIs for
    the Play release; two ABIs push react-native-svg's C++ codegen past the 1 h
    CI timeout, so the F-Droid build is arm64-only (covers virtually all active
    devices).
  - `org.gradle.jvmargs=-Xmx1536m` + `org.gradle.daemon=false` — the repo default
    is 2 GB for local dev; on the CI runner that starves the parallel C++ workers
    and the Metro/Hermes Node process (hermesc exit 5), so the heap is capped.
  - `npm ci --ignore-scripts` skips slow postinstall native compilation; the
    `patches/` are then re-applied explicitly via `patch-package` (the Location
    patch strips `play-services-location` from
    `@react-native-community/geolocation` so no proprietary `com.google.android.gms`
    classes ship).

  node_modules handling (per templates/build-react-native.yml). `npm ci` +
  patch-package run in `prebuild`; patch-package strips `play-services-location`
  so no proprietary `com.google.android.gms` classes ship. `scandelete:
  node_modules` then removes RN's inherent (non-proprietary) generated artefacts
  from the scanned/archived source — the bundled i18n binary packs
  (`react-native/React/I18n/strings/*/fbt_language_pack.bin`), prebuilt host
  binaries (other-platform hermesc, fb-dotslash), and stray per-module
  gradle-wrapper.jars. `scanignore` lists the few generated files the gradle
  build genuinely needs so the scan leaves them in place: each autolinked native
  module's `android/build.gradle` (they declare local-path Maven repos pointing at
  `node_modules/react-native/android`), `react-native/ReactAndroid/publish.gradle`,
  the linux `hermes-compiler` hermesc binary used to compile the Hermes bytecode
  bundle, and `@notifee/react-native/android/libs` (notifee ships its `core` as a
  prebuilt AAR in a flatDir Maven repo there).

  Single universal fdroidRelease APK (no ABI splits). Listing text + screenshots
  come from upstream Fastlane: `fastlane/metadata/android/en-US/`. Reproducible
  builds not requested yet (RN/Hermes); APK is F-Droid-signed.

